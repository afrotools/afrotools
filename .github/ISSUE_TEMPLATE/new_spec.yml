name: New spec
description: Propose a new API spec for the registry
labels: ["new-spec"]
body:
  - type: markdown
    attributes:
      value: |
        Fill in the details below to propose a new ATSS spec.
        See [ATSS.md](../ATSS.md) for field rules and the spec lifecycle.

  - type: input
    id: provider
    attributes:
      label: Provider name
      placeholder: e.g. Wave
    validations:
      required: true

  - type: input
    id: provider_slug
    attributes:
      label: Provider slug
      description: Lowercase, no dashes, no spaces
      placeholder: e.g. wave
    validations:
      required: true

  - type: input
    id: capability
    attributes:
      label: Capability
      description: snake_case verb
      placeholder: e.g. create_payment
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - payment
        - sms
    validations:
      required: true

  - type: input
    id: country
    attributes:
      label: Country codes (ISO 3166-1 alpha-2)
      placeholder: e.g. SN, CI, ML
    validations:
      required: true

  - type: input
    id: docs_url
    attributes:
      label: Provider docs URL
      placeholder: https://...
    validations:
      required: true

  - type: textarea
    id: gotchas
    attributes:
      label: Known gotchas
      description: At least 1 specific, actionable entry based on real integration experience
      placeholder: |
        - The payment URL expires after 30 minutes.
        - Always verify status server-side before fulfilling an order.
    validations:
      required: true
